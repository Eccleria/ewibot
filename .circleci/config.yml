version: 2.1
orbs:
  node: circleci/node@7.2.1
jobs:
  lint:
    executor: 
      name: node/default
      tag: '24.14.1'
    steps:
      - checkout
      - node/install-packages:
          pkg-manager: yarn
      - run: yarn run lint
  prettier:
    executor:
      name: node/default
      tag: '24.14.1'
    steps:
      - checkout
      - node/install-packages:
          pkg-manager: yarn
      - run: yarn run prettier
workflows:
  commit_workflow:
    jobs:
      - lint
      - prettier
